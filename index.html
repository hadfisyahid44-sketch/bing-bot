<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HADFI PRO - Auto Engine</title>
    <style>
        :root { --bg-color: #050814; --card-bg: #0b1126; --neon-cyan: #00f3ff; --neon-green: #39ff14; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Courier New', Courier, monospace; }
        body { background-color: var(--bg-color); color: #ffffff; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .wrapper { background: var(--card-bg); width: 100%; max-width: 400px; border-radius: 24px; padding: 25px; border: 1px solid rgba(0, 243, 255, 0.15); box-shadow: 0 0 25px rgba(0,0,0,0.5); }
        .terminal-box { background: #02040a; border: 1px solid rgba(0, 243, 255, 0.1); border-radius: 12px; padding: 12px; height: 150px; overflow-y: auto; font-size: 0.7rem; color: #34d399; margin-bottom: 15px; }
        .btn { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-gas { background: var(--neon-green); color: #000; }
        .btn-reboot { background: transparent; border: 1px solid #ef4444; color: #ef4444; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="wrapper">
        <header style="text-align:center; margin-bottom:20px;">
            <h1 style="color:var(--neon-cyan)">HADFI PRO ENGINE</h1>
        </header>
        <div class="terminal-box" id="logConsole"></div>
        <button class="btn btn-gas" id="btnGas">GAS KEUN</button>
        <button class="btn btn-reboot" id="btnReboot">REBOOT SYSTEM</button>
    </div>

    <script>
        const consoleEl = document.getElementById('logConsole');
        function printLog(text) {
            const entry = document.createElement('div');
            entry.innerHTML = `<span style="color:#00f3ff">></span> ${text}`;
            consoleEl.appendChild(entry);
            consoleEl.scrollTop = consoleEl.scrollHeight;
        }

        // Logic Deteksi Otomatis (Jika bot lagi di dalam MSN/Bing, langsung eksekusi klik)
        if (window.location.hostname.includes("msn.com") || window.location.hostname.includes("bing.com")) {
            printLog("Masuk ke target, mengaktifkan klik otomatis...");
            setTimeout(() => {
                const links = document.querySelectorAll('a[href*="/news/"], a[href*="/search?q="], .news-card a, .b_algo a');
                if (links.length > 0) {
                    printLog("Klik artikel ditemukan!");
                    links[0].click();
                } else {
                    printLog("Tidak ada link, kembali ke dashboard...");
                    window.location.href = "https://username-lo.github.io/nama-repo/"; // GANTI INI KE LINK GITHUB LO!
                }
            }, 3000);
        }

        // Logic Dashboard Utama
        let botState = JSON.parse(localStorage.getItem('hadfi_bot_state')) || { running: false };

        document.getElementById('btnGas').onclick = () => {
            botState.running = true;
            localStorage.setItem('hadfi_bot_state', JSON.stringify(botState));
            printLog("Engine Start: Membuka MSN...");
            window.location.href = "https://www.msn.com/id-id/berita";
        };

        document.getElementById('btnReboot').onclick = () => {
            localStorage.clear();
            printLog("Sistem Reset!");
            window.location.reload();
        };
    </script>
</body>
</html>
