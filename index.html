<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAIFOELFUL PRO CLONE</title>
    <style>
        :root {
            --bg-dark: #111827;
            --card-bg: #1f2937;
            --neon-green: #10b981;
            --text-main: #f3f4f6;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-dark);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text-main);
            overflow: hidden;
        }

        /* Pembungkus Layar Utama (Dashboard UI) */
        #dashboard-ui {
            display: flex;
            flex-direction: column;
            height: 100%;
            box-sizing: border-box;
            padding: 20px;
        }

        h2 {
            text-align: center;
            color: var(--text-main);
            margin: 10px 0;
            font-size: 22px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .sub-header {
            text-align: center;
            font-size: 11px;
            color: #9ca3af;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .panel-box {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid #374151;
        }

        .panel-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .panel-row label {
            font-size: 14px;
            font-weight: 600;
        }

        .input-box {
            width: 80px;
            padding: 6px;
            background: #111827;
            border: 1px solid #4b5563;
            border-radius: 6px;
            color: #fff;
            text-align: center;
            outline: none;
        }

        .delay-group {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .delay-box {
            width: 45px;
            padding: 6px;
            background: #111827;
            border: 1px solid #4b5563;
            border-radius: 6px;
            color: #fff;
            text-align: center;
        }

        .btn-green {
            width: 100%;
            padding: 15px;
            background: var(--neon-green);
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            text-transform: uppercase;
            margin-top: auto;
        }

        #logger-box {
            background: #030712;
            border-radius: 8px;
            padding: 12px;
            font-family: monospace;
            font-size: 12px;
            color: #34d399;
            height: 100px;
            overflow-y: auto;
            margin-top: 15px;
            border: 1px solid #1f2937;
            white-space: pre-wrap;
        }

        /* LAYAR UTAMA PENJEBOL ARTIKEL (IFRAME FULLSCREEN) */
        #content-viewer {
            display: none;
            width: 100%;
            height: 100%;
            border: none;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 999;
            background: white;
        }

        /* Tombol melayang untuk balik ke menu dashboard */
        #back-btn {
            display: none;
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
            background: #ef4444;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

<iframe id="content-viewer"></iframe>
<button id="back-btn" onclick="stopSistem()">REBOOT 🔄</button>

<div id="dashboard-ui">
    <h2>SAIFOELFUL PRO</h2>
    <div class="sub-header">JANGAN LUPA BERSYUKUR</div>

    <div class="panel-box">
        <div class="panel-row">
            <label>MSN</label>
            <input type="checkbox" id="msnSwitch" checked>
        </div>
        <div class="panel-row">
            <span>TARGET:</span>
            <input type="number" id="mTarget" class="input-box" value="10">
        </div>
        <div class="panel-row">
            <span>DELAY(S):</span>
            <div class="delay-group">
                <input type="number" id="mMin" class="delay-box" value="5">
                <input type="number" id="mMax" class="delay-box" value="12">
            </div>
        </div>
    </div>

    <div class="panel-box">
        <div class="panel-row">
            <label>SEARCH</label>
            <input type="checkbox" id="searchSwitch" checked>
        </div>
        <div class="panel-row">
            <span>TARGET:</span>
            <input type="number" id="sTarget" class="input-box" value="20">
        </div>
        <div class="panel-row">
            <span>DELAY(S):</span>
            <div class="delay-group">
                <input type="number" id="sMin" class="delay-box" value="7">
                <input type="number" id="sMax" class="delay-box" value="12">
            </div>
        </div>
    </div>

    <div id="logger-box">> Authenticating...<br>> Access Granted. Welcome, Saiful.</div>

    <button class="btn-green" id="btnGas" onclick="mulaiSistem()">GAS KEUN</button>
</div>

<script>
    const keywords = ["berita hari ini", "wisata indonesia", "resep masakan", "gadget terbaru", "harga emas hari ini", "tips kesehatan", "otomotif update", "saham unggulan", "cuaca hari ini", "prediksi bola"];
    
    // Basis artikel internal MSN Indonesia asli yang valid & bisa di-render di dalam app
    const msnLinks = [
        "https://www.msn.com/id-id/berita/nasional",
        "https://www.msn.com/id-id/berita/teknologi-dan-sains",
        "https://www.msn.com/id-id/entertainment/celebrity",
        "https://www.msn.com/id-id/berita/dunia",
        "https://www.msn.com/id-id/olahraga/sepakbola",
        "https://www.msn.com/id-id/ekonomi/bisnis"
    ];

    let running = false;

    function cetakLog(teks) {
        const lb = document.getElementById('logger-box');
        lb.innerHTML += `<br>> ${teks}`;
        lb.scrollTop = lb.scrollHeight;
    }

    const jedaWaktu = (ms) => new Promise(res => setTimeout(res, ms));

    async function mulaiSistem() {
        running = true;
        const msnAktif = document.getElementById('msnSwitch').checked;
        const searchAktif = document.getElementById('searchSwitch').checked;

        const mTarget = parseInt(document.getElementById('mTarget').value) || 0;
        const mMin = parseInt(document.getElementById('mMin').value) || 5;
        const mMax = parseInt(document.getElementById('mMax').value) || 12;

        const sTarget = parseInt(document.getElementById('sTarget').value) || 0;
        const sMin = parseInt(document.getElementById('sMin').value) || 7;
        const sMax = parseInt(document.getElementById('sMax').value) || 12;

        const iframe = document.getElementById('content-viewer');
        const backBtn = document.getElementById('back-btn');

        // === EKSEKUSI PROSES 1: MSN AUTO READ (SAMA PERSIS KAYAK DI VIDEO) ===
        if (msnAktif && mTarget > 0) {
            // Tampilkan elemen pengunci layar artikel
            iframe.style.display = "block";
            backBtn.style.display = "block";

            for (let i = 0; i < mTarget; i++) {
                if (!running) break;
                
                // Pilih halaman internal berita harian msn secara acak
                const targetUrl = msnLinks[i % msnLinks.length] + "?p=" + Math.floor(Math.random() * 999);
                
                cetakLog(`MSN: Opening Article ${i + 1}/${mTarget}`);
                
                // Suntik halaman masuk ke dalam frame aplikasi secara full screen
                iframe.src = targetUrl;

                // Hitung mundur jeda pengerjaan (Timer Countdown bawaan video)
                const hitungJeda = Math.floor(Math.random() * (mMax - mMin + 1) + mMin);
                for (let j = hitungJeda; j > 0; j--) {
                    if (!running) break;
                    cetakLog(`Processing... sisa ${j}s`);
                    await jedaWaktu(1000);
                }
            }
            
            // Sembunyikan frame setelah sesi MSN beres
            iframe.style.display = "none";
            backBtn.style.display = "none";
        }

        // === EKSEKUSI PROSES 2: SEARCH BING AUTO ===
        if (searchAktif && sTarget > 0 && running) {
            iframe.style.display = "block";
            backBtn.style.display = "block";

            for (let i = 0; i < sTarget; i++) {
                if (!running) break;

                const kataKunci = keywords[Math.floor(Math.random() * keywords.length)] + " " + Math.floor(Math.random() * 100);
                const urlSearch = `https://www.bing.com/search?q=${encodeURIComponent(kataKunci)}`;

                cetakLog(`SEARCH: Processing ${i + 1}/${sTarget} -> "${kataKunci}"`);
                iframe.src = urlSearch;

                const hitungJeda = Math.floor(Math.random() * (sMax - sMin + 1) + sMin);
                for (let j = hitungJeda; j > 0; j--) {
                    if (!running) break;
                    cetakLog(`Processing... sisa ${j}s`);
                    await jedaWaktu(1000);
                }
            }

            iframe.style.display = "none";
            backBtn.style.display = "none";
        }

        cetakLog("Proses Selesai Total!");
        running = false;
    }

    function stopSistem() {
        running = false;
        document.getElementById('content-viewer').style.display = "none";
        document.getElementById('back-btn').style.display = "none";
        cetakLog("Sistem Direboot / Diberhentikan Paksa.");
    }
</script>

</body>
</html>
