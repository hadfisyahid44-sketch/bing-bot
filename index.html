<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HADFI PRO - Full System</title>
    <style>
        :root { --bg: #050814; --neon-cyan: #00f3ff; --neon-purple: #bd00ff; --neon-green: #39ff14; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Courier New', monospace; }
        body { background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }

        /* NEON ROTATING BORDER */
        .wrapper {
            position: relative; width: 100%; max-width: 400px;
            background: #0b1126; padding: 3px; border-radius: 20px;
            overflow: hidden; 
        }
        .wrapper::before {
            content: ''; position: absolute; top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: conic-gradient(transparent, var(--neon-cyan), transparent 30%);
            animation: rotate 4s linear infinite;
        }
        .content {
            position: relative; z-index: 1; background: #0b1126;
            padding: 30px; border-radius: 18px; color: white;
        }
        @keyframes rotate { 100% { transform: rotate(360deg); } }

        /* UI ELEMENTS */
        input { width: 100%; padding: 12px; margin: 8px 0; background: #050814; border: 1px solid var(--neon-cyan); color: white; border-radius: 8px; }
        button { width: 100%; padding: 15px; background: var(--neon-cyan); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; box-shadow: 0 0 10px var(--neon-cyan); }
        .terminal { background: #000; color: var(--neon-green); padding: 10px; height: 120px; overflow-y: auto; font-size: 0.7rem; margin-top: 15px; border: 1px solid var(--neon-green); border-radius: 5px; }
        .hidden { display: none; }
        .link { font-size: 0.7rem; color: #888; text-align: center; margin-top: 10px; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="content">
        <h2 style="color:var(--neon-cyan); text-align:center; margin-bottom:15px;">HADFI PRO</h2>
        
        <div id="loginScreen">
            <input type="text" id="logUser" placeholder="Username">
            <input type="password" id="logPass" placeholder="Password">
            <button onclick="login()">LOGIN</button>
            <div class="link" onclick="toggleAuth()">Belum punya akun? Daftar dulu.</div>
        </div>

        <div id="regScreen" class="hidden">
            <input type="text" id="regUser" placeholder="Buat Username">
            <input type="password" id="regPass" placeholder="Buat Password">
            <button onclick="register()">DAFTAR SEKARANG</button>
            <div class="link" onclick="toggleAuth()">Sudah punya akun? Login.</div>
        </div>

        <div id="botScreen" class="hidden">
            <div class="terminal" id="log"></div>
            <button onclick="gas()" style="background:var(--neon-green);">GAS KEUN</button>
            <button onclick="resetSystem()" style="background:transparent; border:1px solid red; color:red;">RESET</button>
        </div>
    </div>
</div>

<script>
    const log = document.getElementById('log');
    function print(t) { log.innerHTML += `> ${t}<br>`; log.scrollTop = log.scrollHeight; }

    // --- AUTH LOGIC ---
    function toggleAuth() {
        document.getElementById('loginScreen').classList.toggle('hidden');
        document.getElementById('regScreen').classList.toggle('hidden');
    }

    function register() {
        let u = document.getElementById('regUser').value;
        let p = document.getElementById('regPass').value;
        let db = JSON.parse(localStorage.getItem('hadfi_users') || "[]");
        db.push({u, p});
        localStorage.setItem('hadfi_users', JSON.stringify(db));
        print("Akun terdaftar! Silahkan login.");
        toggleAuth();
    }

    function login() {
        let u = document.getElementById('logUser').value;
        let p = document.getElementById('logPass').value;
        let db = JSON.parse(localStorage.getItem('hadfi_users') || "[]");
        if(db.find(a => a.u == u && a.p == p)) {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('botScreen').classList.remove('hidden');
            print("Login Sukses: " + u);
        } else {
            print("Login Gagal!");
        }
    }

    // --- BOT ENGINE (AUTO-MSN & SEARCH) ---
    function gas() {
        localStorage.setItem('hadfi_run', 'true');
        localStorage.setItem('hadfi_mode', 'msn');
        window.location.href = "https://www.msn.com/id-id/berita";
    }

    if (localStorage.getItem('hadfi_run') === 'true') {
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('botScreen').classList.remove('hidden');
        
        let mode = localStorage.getItem('hadfi_mode');
        if (mode === 'msn') {
            print("Mode MSN: Membaca...");
            setTimeout(() => {
                const links = document.querySelectorAll('a[href*="/news/"]');
                if(links.length > 0) links[0].click();
                else {
                    localStorage.setItem('hadfi_mode', 'search');
                    window.location.href = "https://www.bing.com/search?q=tren+teknologi+2026";
                }
            }, 5000);
        } else if (mode === 'search') {
            print("Mode Bing: Searching...");
            setTimeout(() => {
                window.location.href = "https://www.bing.com/search?q=info+terkini";
            }, 5000);
        }
    }

    function resetSystem() {
        localStorage.clear();
        location.reload();
    }
</script>
</body>
</html>
